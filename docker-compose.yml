services:
  postgres:
    image: postgres:16-alpine
    container_name: find-postgres
    environment:
      POSTGRES_DB: find_db
      POSTGRES_USER: find_user
      POSTGRES_PASSWORD: find_pass
    ports:
      - "5435:5432"
    volumes:
      - find_pg_data:/var/lib/postgresql/data

volumes:
  find_pg_data:
